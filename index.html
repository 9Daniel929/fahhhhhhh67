<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Three Scene</title>
<style>
  body{ margin:0; overflow:hidden; font-family: sans-serif; }
  /* Overlay Styles */
  #overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex; justify-content: center; align-items: center;
    z-index: 10;
  }
  #playBtn {
    padding: 15px 30px; font-size: 20px; cursor: pointer;
    background: #fff; border: none; border-radius: 5px; font-weight: bold;
  }
</style>
</head>
<body>

<div id="overlay">
  <button id="playBtn">PLAY</button>
</div>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  50,
  window.innerWidth / window.innerHeight,
  0.001,
  10000000000
);

camera.position.set(1.3257474773333948, 4.085757118896425, 8.908145984535496);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1;

// geometries
const geo1 = new THREE.BoxGeometry(1,1,1);
const geo2 = new THREE.BoxGeometry(1,1,1);
const geo3 = new THREE.BoxGeometry(1,1,1);
const geo4 = new THREE.BoxGeometry(1,1,1);

// materials
const mat1 = new THREE.MeshStandardMaterial({color:0xffffff});
const mat2 = new THREE.MeshStandardMaterial({color:0xffffff});
const mat3 = new THREE.MeshStandardMaterial({color:0xffffff});
const mat4 = new THREE.MeshStandardMaterial({color:0xffffff});

// meshes
const floor = new THREE.Mesh(geo1,mat1);
floor.scale.set(8.196479872858708,0.10627480044095419,7.583214829434284);
floor.position.set(0,-0.039698136183214605,0);

const box2 = new THREE.Mesh(geo2,mat2);
box2.position.set(0,3.7216049196755128,0);

const box3 = new THREE.Mesh(geo3,mat3);
box3.position.set(0,2.770081741401227,0);

function smallBox(x,y){
  const m = new THREE.Mesh(geo4,mat4);
  m.scale.set(0.31423856538617906,1,0.5655551700344368);
  m.position.set(x,y,0);
  scene.add(m);
}

scene.add(floor);
scene.add(box2);
scene.add(box3);

smallBox(-0.22949355901836954,1.7761159613843853);
smallBox(0.21229651993020027,1.7761159613843853);
smallBox(0.6806725058896312,2.749653517782651);
smallBox(-0.6396941602799919,2.749653517782651);

// lighting
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff,0.5);
scene.add(ambient);

// --- MOVEMENT LOGIC ---
let isPlaying = false;
const moveSpeed = 0.1;

document.getElementById('playBtn').addEventListener('click', () => {
  document.getElementById('overlay').style.display = 'none';
  isPlaying = true;
});

window.addEventListener("keydown", (e) => {
  if (!isPlaying) return;

  const key = e.key.toLowerCase();
  if (key === 'w') camera.position.z -= moveSpeed; // Forward
  if (key === 's') camera.position.z += moveSpeed; // Back
  if (key === 'a') camera.position.x -= moveSpeed; // Left
  if (key === 'd') camera.position.x += moveSpeed; // Right
  if (e.key === 'ArrowUp') camera.position.y += moveSpeed; // Up
  if (e.key === 'ArrowDown') camera.position.y- += moveSpeed; // Down
});

// resize fix
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// render loop
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
